# Default values for costgraph-operator.

# Global configuration shared across all operator components.
global:
  clusterName: ""
  # apiKey is used to create a Secret when existingSecret is not set.
  # Do not commit a real key here; prefer existingSecret in production.
  apiKey: ""
  # existingSecret: name of a pre-existing Secret that contains the API key.
  # When set, no Secret is created by this chart and apiKey is ignored.
  existingSecret: ""
  # existingSecretKey: key within existingSecret that holds the API key value.
  # Defaults to "apiKey" when not specified.
  existingSecretKey: ""
  # backendURL is the base URL of the Costgraph API. Leave empty to omit the
  # BACKEND_URL env var and rely on the service's built-in default.
  backendURL: "https://api.costgraph.ai"
  namespace: "costgraph"
  # Flag to enable use of our custom image in the cadvisor chart
  security:
    allowInsecureImages: true

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# --------------------------------------------------------------------------
# kube-state-metrics (subchart from prometheus-community)
# See: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-state-metrics
# --------------------------------------------------------------------------
kube-state-metrics:
  enabled: true

# --------------------------------------------------------------------------
# cadvisor (subchart from bitnami)
# See: https://github.com/bitnami/charts/tree/main/bitnami/cadvisor
# --------------------------------------------------------------------------
cadvisor:
  enabled: true
  image:
    registry: ghcr.io
    repository: baselinehq/cadvisor
    tag: "0.56.3-baseline"

# --------------------------------------------------------------------------
# dcgm-exporter (subchart from NVIDIA)
# See: https://github.com/NVIDIA/dcgm-exporter/tree/main/deployment/chart
# Enable this when GPU nodes are present in the cluster. The exporter runs
# as a DaemonSet on GPU nodes and exposes DCGM metrics for Prometheus.
# --------------------------------------------------------------------------
dcgm-exporter:
  enabled: false
  serviceMonitor:
    # Set to true if you have the Prometheus Operator installed and want
    # automatic scrape config generated.
    enabled: false
  # Restrict the DaemonSet to GPU nodes only.
  nodeSelector:
    accelerator: nvidia
  # GPU nodes are commonly tainted — add matching tolerations here.
  tolerations: []
  # Example toleration for the standard NVIDIA GPU taint:
  # tolerations:
  #   - key: nvidia.com/gpu
  #     operator: Exists
  #     effect: NoSchedule
  resources: {}
  podAnnotations: {}
  podLabels: {}

# --------------------------------------------------------------------------
# prometheus-node-exporter (subchart from prometheus-community)
# See: https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus-node-exporter
# Runs as a DaemonSet exposing host-level metrics (CPU, memory, disk, network)
# on port 9100 at /metrics.
# --------------------------------------------------------------------------
prometheus-node-exporter:
  enabled: true
  service:
    port: 9100
    targetPort: 9100
  resources: {}
  tolerations: []
  podAnnotations: {}
  podLabels: {}

# --------------------------------------------------------------------------
# costgraph-operator-kubernetes deployment
# --------------------------------------------------------------------------
operatorKubernetes:
  enabled: true
  image:
    repository: ghcr.io/baselinehq/costgraph-operator-kubernetes
    tag: "sha-128782e"
    pullPolicy: IfNotPresent
  # This should always be 1
  replicas: 1
  config:
    operatorVersion: "1.0.0"
  resources: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  env: []

# --------------------------------------------------------------------------
# costgraph-operator-prometheus deployment
# --------------------------------------------------------------------------
operatorPrometheus:
  enabled: true
  image:
    repository: ghcr.io/baselinehq/costgraph-operator-prometheus
    tag: "sha-ef2bc40"
    pullPolicy: IfNotPresent
  # This should always be 1
  replicas: 1
  config:
    remoteWriteURL: "https://tsdb.costgraph.ai"
    remoteWritePath: "/api/v1/write"
    prometheusAPIProvider: "prometheus"
    prometheusAPIVersion: "kube-state-metrics"
    httpTimeout: "30s"
  # ------------------------------------------------------------------------
  # scrapeTargets: map of in-cluster /metrics endpoints to discover and push
  # to remote write. Adding a new metrics source no longer requires a new
  # operator image — just append an entry here.
  #
  # Map keys are the target names (used in logs). A map (not a list) is used so
  # callers can override individual fields via Helm `--set` without clobbering
  # siblings, e.g.:
  #   --set operatorPrometheus.scrapeTargets.node-exporter.namespace=monitoring
  #
  # Each entry:
  #   namespace     (required) — pod namespace
  #   labelSelector (required) — Kubernetes label selector for pod discovery
  #   port          (required) — HTTP port the exporter listens on, 1..65535
  #   path          (optional) — metrics path. Defaults to /metrics.
  #   enabled       (optional) — when false, the entry is omitted. Defaults to true.
  #
  # Templated as JSON into the SCRAPE_TARGETS env var on the deployment.
  # ------------------------------------------------------------------------
  scrapeTargets:
    cadvisor:
      enabled: true
      namespace: "{{ include \"costgraph-operator.namespace\" . }}"
      labelSelector: "app.kubernetes.io/name=cadvisor"
      port: 8080
    kube-state-metrics:
      enabled: true
      namespace: "{{ include \"costgraph-operator.namespace\" . }}"
      labelSelector: "app.kubernetes.io/name=kube-state-metrics"
      port: 8080
    dcgm-exporter:
      enabled: false
      namespace: "{{ include \"costgraph-operator.namespace\" . }}"
      labelSelector: "app.kubernetes.io/name=dcgm-exporter"
      port: 9400
    node-exporter:
      enabled: true
      namespace: "{{ include \"costgraph-operator.namespace\" . }}"
      labelSelector: "app.kubernetes.io/name=prometheus-node-exporter"
      port: 9100
  resources: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  env: []
